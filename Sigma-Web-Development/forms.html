<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms- Let's Get Started</title>
</head>
<body>
    <h1>Form to apply for Sigma Web Development Course - TA </h1>
    <form action="post">
        <div>
            <label for="username">Enter your username: </label>
            <input type="text" name="username" placeholder="Enter your username">
        </div>
        <!-- input type - Radio Buttons -->
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <!-- input type - Checkbox -->
        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <!-- Textarea tag -->
        <div>
            <label for="comment">Enter your comment: </label>
            <br>
            <textarea name="comment" id="comment" rows="4" cols="50">Enter your comment here...
            </textarea>
        </div>
        <!-- to create dropdown of selection in options in HTML we use the select tag -->
        <div>
            <select name="fruits" id="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="orange">Orange</option>
            </select> 
        </div>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        div {
            width: 800px;
            height: 600px;
            background-color: lightblue;
            border: 5px dotted darkblue;
        }
        .text{
            font-size: 24px;
            color: darkblue;
            text-align:justify;
        }
        .skill{
            font-size:18px;
            color:darkgreen;
            text-align:justify;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="text">Introduction</h1><br>
        <p class="skill">These are all my technical skills.</p>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Python</li>
            <li>C++</li>
        </ul>
    </div>

<!-- 
Border is a CSS property that allows you to add a border around an element.
The "border" property is a shorthand property that allows you to set the width, style, and color of the border in one declaration.

1.width - The thickness of the border. It can be specified in pixels, ems, or other units, or with one of the following keywords: thin,medium, or thick.
2.style - The design of the border. Web browsers can render any of the 10 different styles. Some of these include: none, dotted, and solid.

style{
/*Keyword values*/
border-style: none;
border-style: hidden;
border-style: dotted;   
border-style: dashed;
border-style: solid;
border-style: double;
border-style: groove;
border-style: ridge;
border-style: inset;
border-style: outset;

/*top | right | bottom | left */
border-style: none solid dotted dashed;

/*Global values*/
border-style:inherit;
border-style:initial;
border-style:revert;
border-style:revert-layer;
border-style:unset;
}

3 color- The color of the border. It can be specified using a color name, a hex code, an RGB value, or an HSL value. If no color is specified, the border will use the color of the element's text.

for example:
style{
    border: 5px dotted darkblue;
}
-->

















-->
</body>
</html>

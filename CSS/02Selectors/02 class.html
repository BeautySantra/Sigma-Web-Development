    <!-- Class is a user defined selector in CSS. It is used to target specific elements in HTML document and apply styles to them. A class selector is defined with a dot(.) or period followed by the class name. The class named can be any valid identifier and it is case sensitive.
     To use a class selector, you simply add the class attributes to the HTML elements you want to style and assign it class name. Then,in your CSS,you can define the styles for that class selector using the dot(.).
     For example, if you have a class named "my-class", you can target it in your CSS like this:

     .my-class{
        color:red;
        font-size:16px;
        background-color:beige;
    
     }
Note: 1.if we have multiple elements with the same class name, the styles defined for that class will be applied to all those elements. This allows you to easily apply consistent styling to multiple elements without having to write separate CSS rules for each one.
      2.if you want to apply multiple classes to an element, you can do so by separating the class names with a space in the class attribute. For example, if you have two classes named "class1" and "class2", you can apply both classes to an element like this:

        <div class="class1 class2">This element has both class1 and class2 applied.</div>

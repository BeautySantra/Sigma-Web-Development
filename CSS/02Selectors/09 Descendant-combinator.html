<!-- 
  Descendant Combinator is used to select elements that are nested within other elements in the HTML document. It allows you to target specific elements based on their hierarchical relationship in the DOM tree. 
  The descendant combinator is represented by a space between two selectors.  

For Example, if you want to select all <li> elements that are descendants of an <ol> element, you can use the following CSS rule:
ol li {
    /* Styles for <li> elements that are descendants of <ol> */
    color: blue;
    font-size: 16px;
}

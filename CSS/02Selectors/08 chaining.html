<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaining</title>
</head>
<body>
    <h1>Beauty Santra</h1>
    <br>
    <p class="Engineer">Software Development Engineer- Microsoft</p>
    <p>I am a software development engineer at Microsoft.</p>

<!-- 
    
Chaining in CSS means combining multiple selectors to target specific elements more precisely. It allows you to apply styles to elements that match all the specified selectors in the chain. Chaining can be done using different types of selectors, such as type selectors, class selectors, ID selectors, and pseudo-classes.
For example, you can chain a class selector with a type selector to style only specific elements that have that class. This helps in creating more targeted and efficient styles for your web pages.

Example of chaining selectors in CSS:
/* Chaining a class selector with a type selector */
p.Engineer {
    color: blue;
    font-weight: bold;
    font-size: 18px;
    font-family: Arial, sans-serif;
}


Regardless of the type of selector , it is followed by "." and then the class name or id name. The class name or id name should not have any space in between. If there is a space, it will be considered as a descendant selector and will not work as expected.



-->

</body>
</html>

<!DOCTYPE html>

<link rel="stylesheet" href="10 Multiple-selector.css">

<body>
    <h1>Hi I am Beauty Santra, these are all my skills.</h1>
    <br>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>Python</li>
    </ol>
<p>I am a web developer and I love creating beautiful websites. <br> I am also a data scientist and I enjoy analyzing data.</p>
<!-- 

Multiple selector is used to select multiple elements at once.
It is represented by a comma (,) between two or more selectors.


For Example, if you want to select all <h1> and <p> elements, you can use the following CSS rule:
h1, p {
    /* Styles for <h1> and <p> elements */
    color: blue;
    font-size: 16px;
}

-->

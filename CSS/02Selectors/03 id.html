<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
<link rel="stylesheet" href="03 id.css">
</head>
<body>
    <h1 id="heading">This is a heading</h1>
    <p id="paragraph">This is a paragraph.</p>

<!-- 
    
Id selectors are used to select a single element with a specific id attribute. The id attribute should be unique within a page, meaning that it should only be used once per page.
The id selector is defined by using the hash symbol (#) followed by the id value. For example, to select the element with the id "heading", you would use the following CSS:
#heading {
    color: blue;
    font-size: 24px;
 }


Note: 1. The id selector is case-sensitive, so make sure to use the correct capitalization when referencing the id in your CSS.
      2. The id selector has a higher specificity than class selectors, so it will override any styles applied to the same element using class selectors.
      3. It is recommended to use id selectors sparingly and only when necessary, as they can make your CSS less maintainable and harder to read. Instead, consider using class selectors or other types of selectors for styling multiple elements with similar styles.
      4. The id selector can also be used in JavaScript to select and manipulate elements on the page. For example, you can use the document.getElementById() method to select an element with a specific id and then modify its properties or add event listeners to it.
      5. When using id selectors, it is important to ensure that the id values are unique and descriptive, as this can help improve the accessibility and usability of your website. Additionally, using semantic HTML elements and meaningful id values can also help improve the search engine optimization (SEO) of your website.




-->
    
</body>
</html>

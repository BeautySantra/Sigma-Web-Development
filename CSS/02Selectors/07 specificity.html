<!-- 
    
Specificity: Specificity in CSS is a set of rules that determine which styles are applied to an element when multiple conflicting styles are present. It is a way to calculate the importance of a selector based on its components, such as element type, class, ID, and inline styles.

Priority of Specificity: The specificity of a selector is calculated based on the following hierarchy (from highest to lowest):
1. Inline styles (1,0,0,0)
2. IDs (#id) (0,1,0,0)
3. Classes, attributes, and pseudo-classes (.class, [attribute], :pseudo-class) (0,0,1,0)
4. Elements and pseudo-elements (0,0,0,1)



priority: Id > Class > Type
To make styles easy to edit, it's best to style with a type selector , if possible.
If not , add a class selector. If that is not enough, add an ID selector. If that is still not enough, use inline styles.



-->

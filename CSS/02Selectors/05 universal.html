<body>
    <h1>Universal Selector</h1>
    <p>The universal selector in CSS is represented by the asterisk (*) symbol.It is used to select all elements on the webpage, regardless of their type or class. When you apply styles using the universal selector, it will affect every element in the document.</p>
    <br>
    <h2>Cascading Style Sheets</h2>

<!-- 
    
The Universal Selector

The universal selector is a powerful tool in CSS that allows you to apply styles to all elements on a webpage. It is represented by the asterisk (*) symbol and can be used to set default styles for all elements, such as font size, color, or margin.

Example of using the universal selector in CSS:
* {
    font-family: Arial, sans-serif;
    color: #333;
}

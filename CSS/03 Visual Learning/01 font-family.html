<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Family</title>

    <style>
        h1{
            font-family: sans-serif;
        }
        p{
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Introduction</h1>
    <p>My name is Beauty Santra.</p>
    <br>
    <p>I am currently enrolled in Bachelor of Technology in Computer Science with specialization in Data Science.</p>
    <br>
    <p>I am in my 1st year of college and I am currently learning about CSS.</p>

    <!-- 
    
    font-family is a CSS property that allows you to specify the typeface or font to be used for text content on a webpage. It enables you to control the appearance of text by selecting from a variety of fonts, including system fonts, web-safe fonts, and custom fonts.
    It can take a list of font names as its value, allowing you to provide fallback options in case the preferred font is not available on the user's device. The browser will use the first available font from the list.
    If none of the specified fonts are available, the browser will use a default font.

    for example:

    h1{
    
        font-family: Arial, specified-font;
    }
    
    

    Specific font- https://www.cssfontstack.com/

    -->

</body>
</html>

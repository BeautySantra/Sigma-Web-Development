<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font-size</title>
    <style>
        h1{
            font-size:36px;
        }
        p{
            font-size:18px;
        }
    </style>
</head>
<body>
    <h1>Introduction</h1>
    <p>My name is Beauty Santra</p>
    <br>
    <p>I am currently pursuing my Bachelors of Technology degree in Computer Science with specialisation in Data Science.</p>
    <br>
    <p>I am in my 1st year of college and I am currently learning CSS.</p>

    <!-- 
    
    Font-size is a CSS property that specifies the size of the font.
    It can take various units such as pixels px, em, rem, percentages % etc.

    For example:

    h1{
        font-size: specified-size;
    }
    

    -->
    
</body>
</html>

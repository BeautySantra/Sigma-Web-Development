<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Setup</title>
    <!-- 2. Internal css -->
     <style>
        h1{
            color: blueviolet;
            background-color: aquamarine;
        }
     </style>
     <!-- h1 : selector(targeting HTML elements) -->
      <!-- Declaration block: {color: blueviolet; background-color: aquamarine;} -->
      <!-- Declaration : color: blueviolet; background-color: aquamarine; -->
      <!-- Property: color, background-color -->
        <!-- Value: blueviolet, aquamarine -->
</head>
<body>
    <!-- 1. Inline CSS -->
    <h1 style="color: blueviolet; background-color: aquamarine;">Three ways to add CSS to HTML </h1>
<!-- Css Anatomy -->
 <!-- opening tag: <h1 style="color: blueviolet; background-color: aquamarine;">Three ways to add CSS to HTML </h1> -->
  <!-- Declaration : color:blueviolet; background-color: aquamarine; -->
   <!-- property: color, background-color -->
    <!-- value: blueviolet, aquamarine -->
     <!-- Attribute: style -->
    <div>
        <ol>
            <li>Inline CSS</li>
            <li>Internal CSS</li>
            <li>External CSS</li>
        </ol>
    </div>
    <p>
        I love CSS and I am learning it.
    </p>
</body>
</html>

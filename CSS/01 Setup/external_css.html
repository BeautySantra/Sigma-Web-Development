<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Introduction</h1>
    <br>
    <p>External CSS is defined in a separate .css file and linked to the HTML document using the <link> tag in the head section.</p>
    <br>
    <!-- External css -->
     <!-- 1. create an external css file with .css extension -->
     <!-- 2. write css code in the external css file -->
     <!-- 3. link the external css file to the html file using <link> tag in the head section -->
<!-- example of External css -->
 <!-- 
p {
    color: blueviolet;
    background-color: aquamarine;
 -->
    <!-- in the above example,we have created an external CSS file named style.css and added the CSS code to style the paragraph element with blueviolet text and aquamarine background. We then linked the external CSS file to the HTML file using the <link> tag in the head section.ow all the paragraph elements in our HTML document will be styled with blueviolet text and aquamarine background as defined in the external CSS file. -->
    </body>
</html>

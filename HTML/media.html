<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Media</title>

<body>
<!-- The Video tag -->
    <video src="videos/videoplayback.mp4" height="350" controls loop></video>

<!-- attributes for <video> element:
     - src: The URL of the video file
     - height: The height of the video player
     - controls: Displays video controls
     - autoplay: Starts playing the video automatically
     - loop: Repeats the video indefinitely
     - muted: Mutes the audio of the video
     - poster: Specifies an image to be shown while the video is downloading or until the user hits the play button
     -width: The width of the video player

 -->
     <br>
